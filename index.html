<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuzzSys</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <!-- QR code library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyBeTlvIU2lPUNVwKFSr7KqezCC9JJbJbsY",
      authDomain:        "buzzer-f2b72.firebaseapp.com",
      projectId:         "buzzer-f2b72",
      storageBucket:     "buzzer-f2b72.firebasestorage.app",
      messagingSenderId: "942193699731",
      appId:             "1:942193699731:web:a704201720aed264671666"
    });
    const db = firebase.firestore();
  </script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ab:#080b0f;--ap:#0e1318;--abr:#1c2433;
  --ac:#00c896;--at:#b8cfe0;--am:#3d5068;--ad:#f0404a;
  --qb:#010509;--qc:#00ffc8;--qp:#ff00aa;--ql:#007bff;
}
html,body{height:100%}
body{font-family:'IBM Plex Mono',monospace;background:var(--ab);color:var(--at);overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--abr);border-radius:2px}
.page{display:none;min-height:100vh;flex-direction:column}
.page.active{display:flex}

/* ── ADMIN ───────────────────────────────────── */
#pg-admin{background:var(--ab)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--ap);border-bottom:1px solid var(--abr);flex-shrink:0}
.logo{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--ac);font-weight:500}
.sub{font-size:10px;letter-spacing:2px;color:var(--am);text-transform:uppercase}
.abody{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden;height:calc(100vh - 53px)}
.sidebar{border-right:1px solid var(--abr);display:flex;flex-direction:column;overflow:hidden}
.sec{padding:18px;border-bottom:1px solid var(--abr)}
.sec-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--am);margin-bottom:12px}
.ai{width:100%;padding:9px 12px;background:#070a0d;border:1px solid var(--abr);color:var(--at);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
.ai:focus{border-color:var(--ac)}
.abtn{display:block;width:100%;padding:10px;margin-top:8px;background:transparent;border:1px solid var(--ac);color:var(--ac);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.abtn:hover{background:var(--ac);color:#000}
.abtn.r{border-color:var(--ad);color:var(--ad)}
.abtn.r:hover{background:var(--ad);color:#fff}
.abtn.s{width:auto;padding:5px 12px;font-size:9px;margin-top:0}
.slist{flex:1;overflow-y:auto;padding:12px}
.sc{padding:12px 14px;margin-bottom:8px;background:#070a0d;border:1px solid var(--abr);cursor:pointer;position:relative;transition:border-color .15s}
.sc:hover,.sc.on{border-color:var(--ac)}
.sc.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac)}
.sname{font-size:13px;color:var(--at);margin-bottom:2px}
.scode{display:block;font-size:24px;letter-spacing:6px;color:var(--ac);font-weight:700;margin:4px 0 2px}
.smeta{font-size:10px;color:var(--am)}
.amain{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;align-items:center;border-bottom:1px solid var(--abr);background:var(--ap);padding:0 24px;flex-shrink:0}
.tab{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--am);padding:14px 16px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .2s}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab:hover:not(.on){color:var(--at)}
.tabr{margin-left:auto;display:flex;gap:8px;align-items:center}
.acontent{flex:1;overflow-y:auto;padding:24px 28px}
.ct{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--am);margin-bottom:18px}
.empty{text-align:center;padding:60px 20px;color:var(--am);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.qg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.qc{background:var(--ap);border:1px solid var(--abr);padding:14px;position:relative}
.qnum{position:absolute;top:8px;right:10px;font-size:30px;font-weight:700;color:var(--ac);opacity:.2}
.qname{font-size:14px;color:var(--at)}
.qtime{font-size:10px;color:var(--am);margin-top:3px}
.qact{margin-top:10px}
.ltbl{width:100%;border-collapse:collapse}
.ltbl th{text-align:left;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--am);padding:7px 10px;border-bottom:1px solid var(--abr)}
.ltbl td{padding:9px 10px;font-size:12px;border-bottom:1px solid #0a0e14;vertical-align:middle}
.ltbl tr:hover td{background:#0a0e14}
.lbadge{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:#131d2a;color:var(--ac);font-size:10px;font-weight:700}
.tdis{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--am);padding:2px 7px;border:1px solid var(--abr)}
.tact{font-size:10px;color:var(--ac);letter-spacing:1px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot.live{background:var(--ac);animation:dp 1.5s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}
.dot.closed{background:var(--am)}

/* QR Panel */
.qr-panel{
  background:var(--ap);border:1px solid var(--abr);
  padding:20px;text-align:center;
}
.qr-panel-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--am);margin-bottom:14px}
.qr-wrap{
  display:inline-block;padding:12px;background:#fff;
  margin-bottom:12px;
}
.qr-wrap canvas,.qr-wrap img{display:block}
.qr-url{
  font-size:9px;color:var(--am);letter-spacing:1px;
  word-break:break-all;margin-top:6px;
}
.qr-hint{
  font-size:10px;color:var(--ac);letter-spacing:1px;
  margin-top:4px;
}

/* ── AUDIENCE ────────────────────────────────── */
#pg-audience{background:var(--qb);align-items:center;justify-content:center;position:relative;overflow:hidden;font-family:'Orbitron',sans-serif}
#stars{position:fixed;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:sb var(--sd) var(--ss) infinite alternate ease-in-out}
@keyframes sb{from{opacity:var(--sa);transform:scale(1)}to{opacity:var(--sb);transform:scale(1.8)}}
.floor{position:fixed;bottom:0;left:0;right:0;height:42vh;perspective:500px;pointer-events:none}
.floor-i{width:100%;height:100%;background:linear-gradient(rgba(0,255,200,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,200,.06) 1px,transparent 1px);background-size:55px 55px;transform:rotateX(68deg);transform-origin:bottom;animation:fp 5s ease-in-out infinite}
@keyframes fp{0%,100%{opacity:.45}50%{opacity:.9}}
.ring{position:fixed;border-radius:50%;border:1px solid;pointer-events:none;left:50%;top:48%;animation:ro var(--rd) var(--rs) ease-out infinite;opacity:0}
@keyframes ro{0%{transform:translate(-50%,-50%) scale(.15);opacity:.7}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
.qwrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:22px;padding:24px;width:100%;max-width:500px}
.qtitle{font-size:clamp(26px,6.5vw,52px);font-weight:900;letter-spacing:8px;text-transform:uppercase;background:linear-gradient(130deg,var(--qc),var(--ql));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 24px rgba(0,255,200,.35));animation:bob 3.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.qcard{width:100%;background:rgba(0,15,35,.72);border:1px solid rgba(0,255,200,.18);backdrop-filter:blur(18px);padding:26px;position:relative;overflow:hidden}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--qc),transparent);animation:sc2 2.2s linear infinite}
@keyframes sc2{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.qlbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,255,200,.4);font-family:'Share Tech Mono',monospace;margin-bottom:7px}
.qf{width:100%;padding:12px;background:rgba(0,255,200,.04);border:1px solid rgba(0,255,200,.25);color:var(--qc);font-family:'Orbitron',sans-serif;font-size:26px;font-weight:700;letter-spacing:10px;text-align:center;text-transform:uppercase;outline:none;transition:all .3s;margin-bottom:16px}
.qf::placeholder{color:rgba(0,255,200,.18);font-size:11px;letter-spacing:3px;font-weight:400}
.qf:focus{border-color:var(--qc);box-shadow:0 0 30px rgba(0,255,200,.1),inset 0 0 16px rgba(0,255,200,.04)}
.qf.nm{font-size:13px;letter-spacing:2px;color:rgba(200,230,255,.9);font-family:'Share Tech Mono',monospace}
.qjoin{width:100%;padding:15px;background:transparent;border:2px solid var(--qc);color:var(--qc);font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all .25s;margin-top:2px}
.qjoin:hover:not(:disabled){background:rgba(0,255,200,.08);box-shadow:0 0 36px rgba(0,255,200,.22)}
.qjoin:disabled{opacity:.5;cursor:not-allowed}
.qerr{display:none;margin-top:10px;padding:10px 14px;background:rgba(240,64,74,.12);border:1px solid rgba(240,64,74,.4);color:#f0606a;font-size:11px;letter-spacing:.5px;font-family:'Share Tech Mono',monospace;line-height:1.5}
.bzzone{display:flex;flex-direction:column;align-items:center;gap:16px}
.bzs{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,255,200,.3);font-family:'Share Tech Mono',monospace}
.bzw{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center}
.bzp{position:absolute;inset:0;border-radius:50%;border:2px solid var(--qc);opacity:0;animation:bpulse 2.2s ease-out infinite}
.bzp:nth-child(2){animation-delay:.73s}
.bzp:nth-child(3){animation-delay:1.46s}
@keyframes bpulse{0%{transform:scale(.75);opacity:.45}100%{transform:scale(1.6);opacity:0}}
.bzb{width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 36% 30%,rgba(0,255,200,.25),rgba(0,35,55,.92) 68%);border:3px solid var(--qc);color:var(--qc);font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .15s;position:relative;z-index:1;box-shadow:0 0 50px rgba(0,255,200,.15),inset 0 0 30px rgba(0,255,200,.04)}
.bzb:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 90px rgba(0,255,200,.35)}
.bzb:active:not(:disabled){transform:scale(.95)}
.bzb.fired{background:radial-gradient(circle at 36% 30%,rgba(255,0,170,.32),rgba(55,0,38,.92) 68%);border-color:var(--qp);color:var(--qp);box-shadow:0 0 80px rgba(255,0,170,.28)}
.bzb.gone{background:radial-gradient(circle at 36% 30%,rgba(50,50,50,.2),rgba(10,10,10,.92) 68%);border-color:#222;color:#2a2a2a;cursor:not-allowed;box-shadow:none}
.bzpos{font-size:76px;font-weight:900;line-height:1;background:linear-gradient(130deg,var(--qc),var(--ql));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 28px rgba(0,255,200,.45));animation:pglow 2.5s ease-in-out infinite}
@keyframes pglow{0%,100%{filter:drop-shadow(0 0 18px rgba(0,255,200,.4))}50%{filter:drop-shadow(0 0 44px rgba(0,255,200,.75))}}
.bzplbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,255,200,.35);font-family:'Share Tech Mono',monospace;margin-top:2px}
.bzst{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Share Tech Mono',monospace}
.bzst.idle{color:rgba(0,255,200,.45)}
.bzst.wait{color:var(--qp)}
.bzst.out{color:#555}
.bzlv{background:transparent;border:1px solid rgba(255,0,170,.22);color:rgba(255,0,170,.38);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 20px;cursor:pointer;transition:all .2s}
.bzlv:hover{border-color:var(--qp);color:var(--qp)}
.bzfl{position:fixed;inset:0;z-index:500;pointer-events:none;background:var(--qc);animation:fout .55s ease-out forwards}
@keyframes fout{0%{opacity:0}12%{opacity:.22}100%{opacity:0}}

/* Session ended overlay for audience */
.sess-ended{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(1,5,9,.95);
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  font-family:'Orbitron',sans-serif;
  text-align:center;padding:32px;
}
.sess-ended.show{display:flex}
.sess-ended-title{font-size:22px;font-weight:900;letter-spacing:4px;color:var(--qp)}
.sess-ended-sub{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.4);font-family:'Share Tech Mono',monospace}
.sess-ended-btn{margin-top:8px;padding:12px 28px;background:transparent;border:2px solid var(--qc);color:var(--qc);font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .25s}
.sess-ended-btn:hover{background:rgba(0,255,200,.1)}
</style>
</head>
<body>

<!-- ADMIN PAGE -->
<div id="pg-admin" class="page active">
  <div class="topbar">
    <span class="logo">BUZZSYS // ADMIN</span>
    <span class="sub">Control Panel</span>
  </div>
  <div class="abody">
    <div class="sidebar">
      <div class="sec">
        <div class="sec-title">New Session</div>
        <input id="inp" class="ai" placeholder="Session name…" onkeydown="if(event.key==='Enter')createSess()"/>
        <button class="abtn" onclick="createSess()">Create Session</button>
      </div>
      <div class="sec" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:0">
        <div class="sec-title">Sessions</div>
        <div class="slist" id="slist"><div class="empty">Connecting…</div></div>
      </div>
    </div>
    <div class="amain">
      <div class="tabs">
        <button class="tab on" id="tq" onclick="setTab('queue')">Live Queue</button>
        <button class="tab"    id="tl" onclick="setTab('log')">History Log</button>
        <button class="tab"    id="tqr" onclick="setTab('qr')">QR Code</button>
        <div class="tabr" id="tabr" style="display:none">
          <button class="abtn s" onclick="clearQ()">Clear Queue</button>
          <button class="abtn s r" id="btnclose" onclick="closeSess()">End Session</button>
        </div>
      </div>
      <div class="acontent" id="content">
        <div class="empty" style="margin-top:70px">Select or create a session</div>
      </div>
    </div>
  </div>
</div>

<!-- AUDIENCE PAGE -->
<div id="pg-audience" class="page">
  <div id="stars"></div>
  <div class="floor"><div class="floor-i"></div></div>
  <div class="ring" style="width:260px;height:260px;border-color:var(--qc);--rd:4.5s;--rs:0s"></div>
  <div class="ring" style="width:260px;height:260px;border-color:var(--ql);--rd:5.8s;--rs:1.4s"></div>
  <div class="ring" style="width:260px;height:260px;border-color:var(--qp);--rd:7.2s;--rs:2.8s"></div>

  <div class="qwrap">
    <div class="qtitle">BUZZER</div>
    <div class="qcard" id="jpanel">
      <div class="qlbl">Your Name</div>
      <input class="qf nm" id="aname" placeholder="Enter your name…" onkeydown="if(event.key==='Enter')audJoin()"/>
      <div class="qlbl">Session Code</div>
      <input class="qf" id="acode" placeholder="XXXX" maxlength="4"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
             onkeydown="if(event.key==='Enter')audJoin()"/>
      <div class="qerr" id="aerr"></div>
      <button class="qjoin" id="jbtn" onclick="audJoin()">Join Session</button>
    </div>

    <div class="bzzone" id="bpanel" style="display:none">
      <div class="bzs" id="bslbl"></div>
      <div class="bzw">
        <div class="bzp"></div><div class="bzp"></div><div class="bzp"></div>
        <button class="bzb" id="bzb" onclick="audBuzz()">BUZZ</button>
      </div>
      <div id="posblk" style="display:none;text-align:center">
        <div class="bzpos" id="posnum">#1</div>
        <div class="bzplbl">your position in queue</div>
      </div>
      <div class="bzst idle" id="bzst">Ready · tap to buzz</div>
      <button class="bzlv" onclick="audLeave()">Leave Session</button>
    </div>
  </div>

  <!-- Session ended overlay -->
  <div class="sess-ended" id="sess-ended">
    <div class="sess-ended-title">SESSION ENDED</div>
    <div class="sess-ended-sub">The host has closed this session</div>
    <button class="sess-ended-btn" onclick="audLeave()">Join Another Session</button>
  </div>
</div>

<script>
/* ── Helpers ─────────────────────────────── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];return s}
function tsMs(ts){if(!ts)return 0;return ts.toMillis?ts.toMillis():Number(ts)}
function fmtT(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function fmtD(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
const TS=()=>firebase.firestore.FieldValue.serverTimestamp();

/* ── Device detection: mobile always gets audience ── */
function isMobile(){return window.innerWidth<=768||/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)}

/* ── URL param helper: ?code=XXXX&name=John ── */
function getParam(k){return new URLSearchParams(window.location.search).get(k)||''}

/* ── Router ──────────────────────────────── */
let starsOk=false;
function goTo(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  if(name==='audience'&&!starsOk)buildStars();
  if(name==='admin')adminBoot();
}

/* ── Stars ───────────────────────────────── */
function buildStars(){
  const w=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const el=document.createElement('div');el.className='star';
    const sz=Math.random()*2+1;
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--sd:${(Math.random()*4+2).toFixed(1)}s;--ss:${(Math.random()*7).toFixed(1)}s;--sa:${(Math.random()*.1).toFixed(2)};--sb:${(Math.random()*.65+.1).toFixed(2)}`;
    w.appendChild(el);
  }
  starsOk=true;
}

/* ════════════════════════════════════════════
   ADMIN
════════════════════════════════════════════ */
const A={selId:null,tab:'queue',_subs:[]};
function killAll(){A._subs.forEach(fn=>{try{fn()}catch{}});A._subs=[];}
function reg(u){if(u)A._subs.push(u);}

// Track sessions created this browser tab so we can delete on close
const mySessionIds=new Set();

function adminBoot(){
  killAll();
  reg(
    db.collection('sessions').orderBy('createdAt','desc')
      .onSnapshot(snap=>{
        renderSess(snap.docs.map(d=>({id:d.id,...d.data()})));
      },err=>{
        document.getElementById('slist').innerHTML='<div class="empty">⚠ '+esc(err.message)+'</div>';
      })
  );
}

function renderSess(list){
  const el=document.getElementById('slist');
  if(!list.length){el.innerHTML='<div class="empty">No sessions yet</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="sc ${A.selId===s.id?'on':''}" data-id="${s.id}" onclick="selSess('${s.id}')">
      <div class="sname">${esc(s.name)}</div>
      <span class="scode">${esc(s.code)}</span>
      <div class="smeta" id="qc-${s.id}">— in queue</div>
      <div class="smeta"><span class="dot ${s.active?'live':'closed'}"></span>${s.active?'ACTIVE':'CLOSED'}</div>
    </div>`).join('');
  list.forEach(s=>{
    reg(db.collection('queue').where('sessionId','==',s.id).onSnapshot(snap=>{
      const c=document.getElementById('qc-'+s.id);
      if(c)c.textContent=snap.size+' in queue';
    }));
  });
}

async function createSess(){
  const inp=document.getElementById('inp');
  const name=inp.value.trim();if(!name)return;
  const ref=await db.collection('sessions').add({
    name,code:genCode(),createdAt:TS(),active:true
  });
  inp.value='';
  mySessionIds.add(ref.id); // track so we auto-delete on tab close
  selSess(ref.id);
}

function selSess(id){
  A.selId=id;
  document.querySelectorAll('.sc').forEach(c=>c.classList.toggle('on',c.dataset.id===id));
  document.getElementById('tabr').style.display='flex';
  startContent();
}

function setTab(t){
  A.tab=t;
  document.getElementById('tq').classList.toggle('on',t==='queue');
  document.getElementById('tl').classList.toggle('on',t==='log');
  document.getElementById('tqr').classList.toggle('on',t==='qr');
  startContent();
}

async function closeSess(){
  if(!A.selId)return;
  await db.collection('sessions').doc(A.selId).update({active:false});
  // Also clear the queue
  const snap=await db.collection('queue').where('sessionId','==',A.selId).get();
  const b=db.batch();snap.forEach(d=>b.delete(d.ref));await b.commit();
}

async function clearQ(){
  if(!A.selId)return;
  const snap=await db.collection('queue').where('sessionId','==',A.selId).get();
  const b=db.batch();snap.forEach(d=>b.delete(d.ref));await b.commit();
}

async function dismiss(id){
  await db.collection('queue').doc(id).delete();
  try{await db.collection('log').doc(id).update({dismissed:true});}catch{}
}

/* Auto-delete sessions when admin closes the tab */
async function cleanupMySessions(){
  const promises=[];
  for(const id of mySessionIds){
    // Mark inactive and delete queue entries
    promises.push(
      db.collection('sessions').doc(id).update({active:false}).catch(()=>{})
    );
    promises.push(
      db.collection('queue').where('sessionId','==',id).get()
        .then(snap=>{const b=db.batch();snap.forEach(d=>b.delete(d.ref));return b.commit();})
        .catch(()=>{})
    );
  }
  await Promise.all(promises);
}

window.addEventListener('beforeunload',()=>{
  // Synchronous beacon approach for reliability on tab close
  if(mySessionIds.size===0)return;
  // Mark sessions inactive synchronously using sendBeacon isn't possible with Firestore,
  // so we use the best available: fire-and-forget + keepalive
  for(const id of mySessionIds){
    db.collection('sessions').doc(id).update({active:false}).catch(()=>{});
  }
});

// Also handle visibility change (phone screen off / tab hidden)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&mySessionIds.size>0){
    for(const id of mySessionIds){
      db.collection('sessions').doc(id).update({active:false}).catch(()=>{});
    }
  }
  // When tab becomes visible again, re-activate if we're still here
  if(document.visibilityState==='visible'&&mySessionIds.size>0){
    for(const id of mySessionIds){
      db.collection('sessions').doc(id).update({active:true}).catch(()=>{});
    }
  }
});

/* Content listener */
let _cu=null;
function stopContent(){if(_cu){try{_cu()}catch{}_cu=null;}}

function startContent(){
  stopContent();
  if(!A.selId)return;
  const sid=A.selId;
  const content=document.getElementById('content');
  content.innerHTML='<div class="empty">Loading…</div>';

  db.collection('sessions').doc(sid).get().then(sdoc=>{
    if(!sdoc.exists)return;
    const sess=sdoc.data();
    document.getElementById('btnclose').style.display=sess.active?'inline-block':'none';

    if(A.tab==='qr'){
      renderQR(sess,sid);
      return;
    }

    const col=A.tab==='queue'?'queue':'log';
    const dir=A.tab==='queue'?1:-1;

    _cu=db.collection(col).where('sessionId','==',sid)
      .onSnapshot(snap=>{
        const rows=snap.docs
          .map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(tsMs(a.buzzedAt)-tsMs(b.buzzedAt))*dir);

        if(A.tab==='queue'){
          let h=`<div class="ct">Live Queue — ${esc(sess.name)} [${esc(sess.code)}] — ${rows.length} waiting</div>`;
          if(!rows.length){
            h+='<div class="empty">Queue is empty — waiting for buzzes</div>';
          }else{
            h+='<div class="qg">'+rows.map((e,i)=>`
              <div class="qc">
                <div class="qnum">#${i+1}</div>
                <div class="qname">${esc(e.name)}</div>
                <div class="qtime">${fmtT(e.buzzedAt)}</div>
                <div class="qact"><button class="abtn s r" onclick="dismiss('${e.id}')">Dismiss</button></div>
              </div>`).join('')+'</div>';
          }
          content.innerHTML=h;
        }else{
          let h=`<div class="ct">History — ${esc(sess.name)} — ${rows.length} events</div>`;
          if(!rows.length){
            h+='<div class="empty">No buzz events yet</div>';
          }else{
            h+=`<table class="ltbl">
              <thead><tr><th>Pos</th><th>Participant</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
              <tbody>${rows.map(e=>`<tr>
                <td><span class="lbadge">#${e.position||'?'}</span></td>
                <td style="color:var(--at);font-weight:500">${esc(e.name)}</td>
                <td style="color:var(--am)">${fmtD(e.buzzedAt)}</td>
                <td style="color:var(--am)">${fmtT(e.buzzedAt)}</td>
                <td>${e.dismissed?'<span class="tdis">Dismissed</span>':'<span class="tact">Active</span>'}</td>
              </tr>`).join('')}</tbody></table>`;
          }
          content.innerHTML=h;
        }
      },err=>{
        content.innerHTML='<div class="empty">⚠ Error: '+esc(err.message)+'</div>';
      });
  });

  reg(db.collection('sessions').doc(sid).onSnapshot(sd=>{
    if(!sd.exists)return;
    document.getElementById('btnclose').style.display=sd.data().active?'inline-block':'none';
  }));
}

/* Generate QR code for a session */
function renderQR(sess,sid){
  const content=document.getElementById('content');
  // Build URL with code pre-filled as param
  const baseUrl=window.location.origin+window.location.pathname;
  const joinUrl=baseUrl+'?code='+sess.code;

  content.innerHTML=`
    <div class="ct">QR Code — ${esc(sess.name)} [${esc(sess.code)}]</div>
    <div class="qr-panel">
      <div class="qr-panel-title">Scan to join session instantly</div>
      <div class="qr-wrap" id="qrdiv"></div>
      <div class="qr-hint">Participants just need to enter their name after scanning</div>
      <div class="qr-url">${esc(joinUrl)}</div>
    </div>`;

  // Generate QR code
  new QRCode(document.getElementById('qrdiv'),{
    text: joinUrl,
    width: 200,
    height: 200,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}

/* ════════════════════════════════════════════
   AUDIENCE
════════════════════════════════════════════ */
const AUD={sess:null,name:'',eid:null,buzzed:false,_sub:null,_sessSub:null};

function audErr(msg){
  const el=document.getElementById('aerr');
  el.textContent=msg;el.style.display=msg?'block':'none';
}
function setJoinBtn(text,disabled){
  const b=document.getElementById('jbtn');
  b.textContent=text;b.disabled=disabled;
}

async function audJoin(){
  const name=document.getElementById('aname').value.trim();
  const code=document.getElementById('acode').value.trim().toUpperCase();
  audErr('');

  if(!name){audErr('Please enter your name.');return;}
  if(code.length!==4){audErr('Enter the 4-character session code.');return;}

  setJoinBtn('Checking…',true);

  try{
    const snap=await db.collection('sessions').where('code','==',code).get();

    if(snap.empty){
      audErr('No session found with code "'+code+'". Check the code and try again.');
      setJoinBtn('Join Session',false);return;
    }

    const activeDocs=snap.docs.filter(d=>d.data().active===true);
    if(!activeDocs.length){
      audErr('Session "'+code+'" has been closed by the host.');
      setJoinBtn('Join Session',false);return;
    }

    AUD.sess={id:activeDocs[0].id,...activeDocs[0].data()};
    AUD.name=name;AUD.buzzed=false;AUD.eid=null;

    document.getElementById('jpanel').style.display='none';
    document.getElementById('bpanel').style.display='flex';
    document.getElementById('bslbl').textContent=AUD.sess.name+' · '+AUD.sess.code;
    document.getElementById('sess-ended').classList.remove('show');
    resetBuzz();

    // Watch for session being closed by admin
    if(AUD._sessSub){try{AUD._sessSub();}catch{}AUD._sessSub=null;}
    AUD._sessSub=db.collection('sessions').doc(AUD.sess.id).onSnapshot(sd=>{
      if(!sd.exists)return;
      if(!sd.data().active){
        // Session ended — show overlay
        document.getElementById('sess-ended').classList.add('show');
        // Stop buzz listener
        if(AUD._sub){try{AUD._sub();}catch{}AUD._sub=null;}
        AUD.buzzed=false;AUD.eid=null;
      }
    });

  }catch(e){
    console.error('audJoin:',e);
    if(e.code==='permission-denied'||String(e.message).includes('permission')){
      audErr('⚠ Permission denied. Ask host to fix Firestore Rules.');
    }else if(e.code==='unavailable'){
      audErr('⚠ No internet connection. Check your network.');
    }else{
      audErr('⚠ '+e.message);
    }
    setJoinBtn('Join Session',false);
  }
}

function resetBuzz(){
  const b=document.getElementById('bzb');
  b.className='bzb';b.textContent='BUZZ';b.disabled=false;
  document.getElementById('posblk').style.display='none';
  const st=document.getElementById('bzst');
  st.textContent='Ready · tap to buzz';st.className='bzst idle';
}

async function audBuzz(){
  if(AUD.buzzed||!AUD.sess)return;
  const b=document.getElementById('bzb');
  b.disabled=true;b.textContent='…';

  try{
    const qsnap=await db.collection('queue').where('sessionId','==',AUD.sess.id).get();
    const pos=qsnap.size+1;

    const entry={
      sessionId:AUD.sess.id,
      name:AUD.name,
      buzzedAt:TS(),
      position:pos,
      dismissed:false,
    };

    const ref=await db.collection('queue').add(entry);
    await db.collection('log').doc(ref.id).set(entry);

    AUD.eid=ref.id;AUD.buzzed=true;

    b.className='bzb fired';b.textContent='BUZZED!';b.disabled=true;
    document.getElementById('posblk').style.display='block';
    document.getElementById('posnum').textContent='#'+pos;
    const st=document.getElementById('bzst');
    st.textContent='In queue — hold tight!';st.className='bzst wait';

    const fl=document.createElement('div');fl.className='bzfl';
    document.body.appendChild(fl);setTimeout(()=>fl.remove(),600);

    if(AUD._sub){try{AUD._sub();}catch{}AUD._sub=null;}
    AUD._sub=db.collection('queue')
      .where('sessionId','==',AUD.sess.id)
      .onSnapshot(snap=>{
        const all=snap.docs
          .map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>tsMs(a.buzzedAt)-tsMs(b.buzzedAt));

        const mine=all.find(e=>e.id===AUD.eid);
        if(!mine){
          // Dismissed or cleared — let them buzz again
          if(AUD._sub){try{AUD._sub();}catch{}AUD._sub=null;}
          AUD.buzzed=false;AUD.eid=null;
          b.className='bzb gone';b.textContent='DISMISSED';b.disabled=true;
          document.getElementById('posblk').style.display='none';
          const st=document.getElementById('bzst');
          st.textContent='Dismissed — buzzing again in 2s…';st.className='bzst out';
          setTimeout(()=>resetBuzz(),2000);
          return;
        }
        const idx=all.findIndex(e=>e.id===AUD.eid)+1;
        document.getElementById('posnum').textContent='#'+idx;
      },err=>console.error('queue watch:',err));

  }catch(e){
    console.error('buzz error:',e);
    b.disabled=false;b.textContent='BUZZ';
  }
}

function audLeave(){
  if(AUD._sub){try{AUD._sub();}catch{}AUD._sub=null;}
  if(AUD._sessSub){try{AUD._sessSub();}catch{}AUD._sessSub=null;}
  AUD.sess=null;AUD.name='';AUD.eid=null;AUD.buzzed=false;
  document.getElementById('bpanel').style.display='none';
  document.getElementById('jpanel').style.display='block';
  document.getElementById('sess-ended').classList.remove('show');
  // Keep name but clear code for convenience
  document.getElementById('acode').value='';
  setJoinBtn('Join Session',false);
  audErr('');
}

/* ════════════════════════════════════════════
   BOOT — decide which page to show
════════════════════════════════════════════ */
(function boot(){
  const code=getParam('code');   // from QR scan: ?code=XXXX

  if(isMobile()){
    // Mobile always gets audience view
    goTo('audience');
    // Pre-fill code if from QR scan
    if(code){
      document.getElementById('acode').value=code;
      // Focus name field so they just type their name
      setTimeout(()=>document.getElementById('aname').focus(),300);
    }
  }else{
    // Desktop — check if they came via QR link
    if(code){
      // Desktop via QR — still show audience
      goTo('audience');
      document.getElementById('acode').value=code;
      setTimeout(()=>document.getElementById('aname').focus(),300);
    }else{
      // Desktop direct load — show admin
      goTo('admin');
    }
  }
})();
