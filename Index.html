<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuzzSys</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Firebase v9 compat (works as plain scripts, no bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    // ── Firebase init ──────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyBeTlvIU2lPUNVwKFSr7KqezCC9JJbJbsY",
      authDomain:        "buzzer-f2b72.firebaseapp.com",
      projectId:         "buzzer-f2b72",
      storageBucket:     "buzzer-f2b72.firebasestorage.app",
      messagingSenderId: "942193699731",
      appId:             "1:942193699731:web:a704201720aed264671666"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --a-bg:     #080b0f;
      --a-panel:  #0e1318;
      --a-border: #1c2433;
      --a-accent: #00c896;
      --a-text:   #b8cfe0;
      --a-muted:  #3d5068;
      --a-danger: #f0404a;
      --a-warn:   #ffaa00;
      --q-bg:     #010509;
      --q-cyan:   #00ffc8;
      --q-pink:   #ff00aa;
      --q-blue:   #007bff;
    }
    html, body { height: 100%; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--a-bg);
      color: var(--a-text);
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--a-border); border-radius: 2px; }

    /* ── Page System ──────────────────────────────────────── */
    .page { display: none; min-height: 100vh; flex-direction: column; }
    .page.active { display: flex; }

    /* ══════════════════════════════════════════════════════
       ADMIN PAGE
    ══════════════════════════════════════════════════════ */
    #pg-admin { background: var(--a-bg); }

    .adm-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: var(--a-panel);
      border-bottom: 1px solid var(--a-border);
      flex-shrink: 0;
    }
    .adm-logo {
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--a-accent); font-weight: 500;
    }
    .adm-sub { font-size: 10px; letter-spacing: 2px; color: var(--a-muted); text-transform: uppercase; }

    .adm-body {
      flex: 1; display: grid;
      grid-template-columns: 300px 1fr;
      overflow: hidden;
      height: calc(100vh - 53px);
    }

    /* sidebar */
    .adm-sidebar {
      border-right: 1px solid var(--a-border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .adm-sec { padding: 18px; border-bottom: 1px solid var(--a-border); }
    .adm-sec-title {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--a-muted); margin-bottom: 12px;
    }
    .adm-input {
      width: 100%; padding: 9px 12px;
      background: #070a0d;
      border: 1px solid var(--a-border);
      color: var(--a-text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px; outline: none;
      transition: border-color .2s;
    }
    .adm-input:focus { border-color: var(--a-accent); }
    .adm-btn {
      display: block; width: 100%; padding: 10px;
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--a-accent);
      color: var(--a-accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all .2s;
    }
    .adm-btn:hover { background: var(--a-accent); color: #000; }
    .adm-btn.red  { border-color: var(--a-danger); color: var(--a-danger); }
    .adm-btn.red:hover { background: var(--a-danger); color: #fff; }
    .adm-btn.sm   { width: auto; padding: 5px 12px; font-size: 9px; margin-top: 0; }

    .sess-list { flex: 1; overflow-y: auto; padding: 12px; }
    .sess-card {
      padding: 12px 14px; margin-bottom: 8px;
      background: #070a0d; border: 1px solid var(--a-border);
      cursor: pointer; position: relative;
      transition: border-color .15s;
    }
    .sess-card:hover, .sess-card.sel { border-color: var(--a-accent); }
    .sess-card.sel::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--a-accent);
    }
    .sess-name { font-size: 13px; color: var(--a-text); margin-bottom: 2px; }
    .sess-code { display: block; font-size: 24px; letter-spacing: 6px; color: var(--a-accent); font-weight: 700; margin: 4px 0 2px; }
    .sess-meta { font-size: 10px; color: var(--a-muted); }

    /* main area */
    .adm-main { display: flex; flex-direction: column; overflow: hidden; }
    .adm-tabs {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--a-border);
      background: var(--a-panel); padding: 0 24px; flex-shrink: 0;
    }
    .adm-tab {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--a-muted); padding: 14px 16px;
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; font-family: 'IBM Plex Mono', monospace;
      transition: all .2s;
    }
    .adm-tab.on  { color: var(--a-accent); border-bottom-color: var(--a-accent); }
    .adm-tab:hover:not(.on) { color: var(--a-text); }
    .tab-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    .adm-content { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .content-title {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--a-muted); margin-bottom: 18px;
    }
    .empty { text-align: center; padding: 60px 20px; color: var(--a-muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

    /* queue cards */
    .q-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .q-card {
      background: var(--a-panel); border: 1px solid var(--a-border);
      padding: 14px; position: relative;
    }
    .q-num { position: absolute; top: 8px; right: 10px; font-size: 30px; font-weight: 700; color: var(--a-accent); opacity: .2; }
    .q-name { font-size: 14px; color: var(--a-text); }
    .q-time { font-size: 10px; color: var(--a-muted); margin-top: 3px; }
    .q-actions { margin-top: 10px; }

    /* log table */
    .log-tbl { width: 100%; border-collapse: collapse; }
    .log-tbl th { text-align: left; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--a-muted); padding: 7px 10px; border-bottom: 1px solid var(--a-border); }
    .log-tbl td { padding: 9px 10px; font-size: 12px; border-bottom: 1px solid #0a0e14; vertical-align: middle; }
    .log-tbl tr:hover td { background: #0a0e14; }
    .lbadge { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; background: #131d2a; color: var(--a-accent); font-size: 10px; font-weight: 700; }
    .tag-dis { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--a-muted); padding: 2px 7px; border: 1px solid var(--a-border); }
    .tag-act { font-size: 10px; color: var(--a-accent); letter-spacing: 1px; }

    /* nav switch btn */
    .nav-switch {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      padding: 7px 14px; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace; background: transparent;
      transition: all .2s;
    }
    .ns-dark { border: 1px solid var(--a-border); color: var(--a-muted); }
    .ns-dark:hover { border-color: var(--a-accent); color: var(--a-accent); }
    .ns-light {
      border: 1px solid rgba(0,255,200,.2); color: rgba(0,255,200,.4);
      position: fixed; top: 14px; right: 14px; z-index: 100;
    }
    .ns-light:hover { border-color: var(--q-cyan); color: var(--q-cyan); }

    /* ══════════════════════════════════════════════════════
       AUDIENCE PAGE
    ══════════════════════════════════════════════════════ */
    #pg-audience {
      background: var(--q-bg);
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      font-family: 'Orbitron', sans-serif;
    }

    /* starfield */
    #stars { position: fixed; inset: 0; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: starBlink var(--sd) var(--ss) infinite alternate ease-in-out;
    }
    @keyframes starBlink {
      from { opacity: var(--sa); transform: scale(1); }
      to   { opacity: var(--sb); transform: scale(1.8); }
    }

    /* grid floor */
    .q-floor { position: fixed; bottom: 0; left: 0; right: 0; height: 42vh; perspective: 500px; pointer-events: none; }
    .q-floor-inner {
      width: 100%; height: 100%;
      background:
        linear-gradient(rgba(0,255,200,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,.06) 1px, transparent 1px);
      background-size: 55px 55px;
      transform: rotateX(68deg); transform-origin: bottom;
      animation: floorPulse 5s ease-in-out infinite;
    }
    @keyframes floorPulse { 0%,100% { opacity: .45; } 50% { opacity: .9; } }

    /* glow rings */
    .q-ring {
      position: fixed; border-radius: 50%; border: 1px solid;
      pointer-events: none; left: 50%; top: 48%;
      animation: ringOut var(--rd) var(--rs) ease-out infinite;
      opacity: 0;
    }
    @keyframes ringOut {
      0%   { transform: translate(-50%,-50%) scale(.15); opacity: .7; }
      100% { transform: translate(-50%,-50%) scale(4);   opacity: 0; }
    }

    /* content wrapper */
    .q-wrap {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: 22px; padding: 24px;
      width: 100%; max-width: 500px;
    }

    .q-title {
      font-size: clamp(26px, 6.5vw, 52px);
      font-weight: 900; letter-spacing: 8px; text-transform: uppercase;
      background: linear-gradient(130deg, var(--q-cyan), var(--q-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 24px rgba(0,255,200,.35));
      animation: titleBob 3.5s ease-in-out infinite;
    }
    @keyframes titleBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    /* join card */
    .q-card {
      width: 100%;
      background: rgba(0, 15, 35, .72);
      border: 1px solid rgba(0,255,200,.18);
      backdrop-filter: blur(18px);
      padding: 26px; position: relative; overflow: hidden;
    }
    .q-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--q-cyan), transparent);
      animation: scanBar 2.2s linear infinite;
    }
    @keyframes scanBar { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

    .q-label {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(0,255,200,.4); font-family: 'Share Tech Mono', monospace;
      margin-bottom: 7px;
    }
    .q-field {
      width: 100%; padding: 12px;
      background: rgba(0,255,200,.04);
      border: 1px solid rgba(0,255,200,.25);
      color: var(--q-cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: 10px; text-align: center;
      text-transform: uppercase; outline: none;
      transition: all .3s; margin-bottom: 16px;
    }
    .q-field::placeholder { color: rgba(0,255,200,.18); font-size: 11px; letter-spacing: 3px; font-weight: 400; }
    .q-field:focus { border-color: var(--q-cyan); box-shadow: 0 0 30px rgba(0,255,200,.1), inset 0 0 16px rgba(0,255,200,.04); }
    .q-field.name {
      font-size: 13px; letter-spacing: 2px;
      color: rgba(200,230,255,.9); font-family: 'Share Tech Mono', monospace;
    }
    .q-join {
      width: 100%; padding: 15px;
      background: transparent; border: 2px solid var(--q-cyan);
      color: var(--q-cyan); font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; cursor: pointer; transition: all .25s;
      margin-top: 2px;
    }
    .q-join:hover { background: rgba(0,255,200,.08); box-shadow: 0 0 36px rgba(0,255,200,.22); }
    .q-err { color: #f04040; font-size: 11px; letter-spacing: 1px; font-family: 'Share Tech Mono', monospace; margin-top: 6px; display: none; }

    /* buzzer zone */
    .bz-zone { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .bz-sess  { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,255,200,.3); font-family: 'Share Tech Mono', monospace; }

    .bz-wrap  { position: relative; width: 190px; height: 190px; display: flex; align-items: center; justify-content: center; }
    .bz-pulse {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid var(--q-cyan); opacity: 0;
      animation: bzPulse 2.2s ease-out infinite;
    }
    .bz-pulse:nth-child(2) { animation-delay: .73s; }
    .bz-pulse:nth-child(3) { animation-delay: 1.46s; }
    @keyframes bzPulse { 0%{transform:scale(.75);opacity:.45} 100%{transform:scale(1.6);opacity:0} }

    .bz-btn {
      width: 150px; height: 150px; border-radius: 50%;
      background: radial-gradient(circle at 36% 30%, rgba(0,255,200,.25), rgba(0,35,55,.92) 68%);
      border: 3px solid var(--q-cyan); color: var(--q-cyan);
      font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      transition: all .15s; position: relative; z-index: 1;
      box-shadow: 0 0 50px rgba(0,255,200,.15), inset 0 0 30px rgba(0,255,200,.04);
    }
    .bz-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 90px rgba(0,255,200,.35); }
    .bz-btn:active:not(:disabled) { transform: scale(.95); }
    .bz-btn.fired {
      background: radial-gradient(circle at 36% 30%, rgba(255,0,170,.32), rgba(55,0,38,.92) 68%);
      border-color: var(--q-pink); color: var(--q-pink);
      box-shadow: 0 0 80px rgba(255,0,170,.28);
    }
    .bz-btn.gone {
      background: radial-gradient(circle at 36% 30%, rgba(50,50,50,.2), rgba(10,10,10,.92) 68%);
      border-color: #222; color: #2a2a2a; cursor: not-allowed; box-shadow: none;
    }

    .bz-pos {
      font-size: 76px; font-weight: 900; line-height: 1;
      background: linear-gradient(130deg, var(--q-cyan), var(--q-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 28px rgba(0,255,200,.45));
      animation: posGlow 2.5s ease-in-out infinite;
    }
    @keyframes posGlow { 0%,100%{filter:drop-shadow(0 0 18px rgba(0,255,200,.4))} 50%{filter:drop-shadow(0 0 44px rgba(0,255,200,.75))} }
    .bz-pos-lbl { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,255,200,.35); font-family: 'Share Tech Mono', monospace; margin-top: 2px; }

    .bz-status { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; }
    .bz-status.idle    { color: rgba(0,255,200,.45); }
    .bz-status.waiting { color: var(--q-pink); }
    .bz-status.out     { color: #333; }

    .bz-leave {
      background: transparent; border: 1px solid rgba(255,0,170,.22);
      color: rgba(255,0,170,.38); font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      padding: 7px 20px; cursor: pointer; transition: all .2s;
    }
    .bz-leave:hover { border-color: var(--q-pink); color: var(--q-pink); }

    /* flash overlay */
    .bz-flash {
      position: fixed; inset: 0; z-index: 500; pointer-events: none;
      background: var(--q-cyan);
      animation: flashOut .55s ease-out forwards;
    }
    @keyframes flashOut { 0%{opacity:0} 12%{opacity:.22} 100%{opacity:0} }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     ADMIN PAGE
═══════════════════════════════════════ -->
<div id="pg-admin" class="page active">
  <div class="adm-topbar">
    <span class="adm-logo">BUZZSYS // ADMIN</span>
    <span class="adm-sub">Control Panel</span>
    <button class="nav-switch ns-dark" onclick="goTo('audience')">→ Audience View</button>
  </div>

  <div class="adm-body">
    <!-- sidebar -->
    <div class="adm-sidebar">
      <div class="adm-sec">
        <div class="adm-sec-title">New Session</div>
        <input id="inp-sess" class="adm-input" placeholder="Session name..."
               onkeydown="if(event.key==='Enter') adminCreateSession()"/>
        <button class="adm-btn" onclick="adminCreateSession()">Create Session</button>
      </div>
      <div class="adm-sec" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:0">
        <div class="adm-sec-title">Sessions</div>
        <div class="sess-list" id="sess-list">
          <div class="empty">Connecting…</div>
        </div>
      </div>
    </div>

    <!-- main -->
    <div class="adm-main">
      <div class="adm-tabs">
        <button class="adm-tab on" id="tb-queue" onclick="adminTab('queue')">Live Queue</button>
        <button class="adm-tab"    id="tb-log"   onclick="adminTab('log')">History Log</button>
        <div class="tab-right" id="tab-actions" style="display:none">
          <button class="adm-btn sm" onclick="adminClearQueue()">Clear Queue</button>
          <button class="adm-btn sm red" id="btn-close" onclick="adminCloseSession()">Close Session</button>
        </div>
      </div>
      <div class="adm-content" id="adm-content">
        <div class="empty" style="margin-top:70px">Select or create a session</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     AUDIENCE PAGE
═══════════════════════════════════════ -->
<div id="pg-audience" class="page">
  <div id="stars"></div>
  <div class="q-floor"><div class="q-floor-inner"></div></div>
  <div class="q-ring" style="width:260px;height:260px;border-color:var(--q-cyan);--rd:4.5s;--rs:0s;"></div>
  <div class="q-ring" style="width:260px;height:260px;border-color:var(--q-blue);--rd:5.8s;--rs:1.4s;"></div>
  <div class="q-ring" style="width:260px;height:260px;border-color:var(--q-pink);--rd:7.2s;--rs:2.8s;"></div>

  <button class="nav-switch ns-light" onclick="goTo('admin')">Admin →</button>

  <div class="q-wrap">
    <div class="q-title">BUZZER</div>

    <!-- join -->
    <div class="q-card" id="join-panel">
      <div class="q-label">Your Name</div>
      <input class="q-field name" id="aud-name" placeholder="Enter your name…"
             onkeydown="if(event.key==='Enter') audJoin()"/>
      <div class="q-label">Session Code</div>
      <input class="q-field" id="aud-code" placeholder="XXXX" maxlength="4"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
             onkeydown="if(event.key==='Enter') audJoin()"/>
      <div class="q-err" id="aud-err"></div>
      <button class="q-join" onclick="audJoin()">Join Session</button>
    </div>

    <!-- buzzer -->
    <div class="bz-zone" id="buzz-panel" style="display:none">
      <div class="bz-sess" id="bz-sess-label"></div>

      <div class="bz-wrap">
        <div class="bz-pulse"></div>
        <div class="bz-pulse"></div>
        <div class="bz-pulse"></div>
        <button class="bz-btn" id="bz-btn" onclick="audBuzz()">BUZZ</button>
      </div>

      <div id="bz-pos-block" style="display:none;text-align:center">
        <div class="bz-pos" id="bz-pos-num">#1</div>
        <div class="bz-pos-lbl">your position in queue</div>
      </div>

      <div class="bz-status idle" id="bz-status">Ready · tap to buzz</div>
      <button class="bz-leave" onclick="audLeave()">Leave Session</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════ */
function genCode() {
  const ch = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 4; i++) s += ch[Math.floor(Math.random() * ch.length)];
  return s;
}
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(ts) {
  if (!ts) return '—';
  const d = (ts.toDate) ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function fmtD(ts) {
  if (!ts) return '—';
  const d = (ts.toDate) ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

/* ════════════════════════════════════════════════════════════
   PAGE ROUTER
════════════════════════════════════════════════════════════ */
let starsReady = false;
function goTo(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-' + name).classList.add('active');
  if (name === 'audience' && !starsReady) buildStars();
  if (name === 'admin') adminInit();
}

/* ════════════════════════════════════════════════════════════
   STARS
════════════════════════════════════════════════════════════ */
function buildStars() {
  const wrap = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const sz = Math.random() * 2 + 1;
    el.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `left:${Math.random()*100}%`, `top:${Math.random()*100}%`,
      `--sd:${(Math.random()*4+2).toFixed(1)}s`,
      `--ss:${(Math.random()*7).toFixed(1)}s`,
      `--sa:${(Math.random()*.12).toFixed(2)}`,
      `--sb:${(Math.random()*.65+.1).toFixed(2)}`
    ].join(';');
    wrap.appendChild(el);
  }
  starsReady = true;
}

/* ════════════════════════════════════════════════════════════
   ADMIN — STATE
════════════════════════════════════════════════════════════ */
let adm = {
  selId:    null,
  tab:      'queue',
  unsubs:   [],         // firestore listeners to detach on reset
};

function unsubAll() {
  adm.unsubs.forEach(fn => { try { fn(); } catch{} });
  adm.unsubs = [];
}

function adminInit() {
  unsubAll();
  // Sessions live listener
  const unsub = db.collection('sessions')
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      renderSessions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    }, err => {
      console.error('Sessions error:', err);
      document.getElementById('sess-list').innerHTML = '<div class="empty">⚠ Firebase error: ' + esc(err.message) + '</div>';
    });
  adm.unsubs.push(unsub);
}

/* ── Sessions panel ─────────────────────────────────────── */
function renderSessions(list) {
  const el = document.getElementById('sess-list');
  if (!list.length) { el.innerHTML = '<div class="empty">No sessions yet</div>'; return; }
  el.innerHTML = list.map(s => `
    <div class="sess-card ${adm.selId===s.id?'sel':''}" data-id="${s.id}" onclick="adminSelect('${s.id}')">
      <div class="sess-name">${esc(s.name)}</div>
      <span class="sess-code">${esc(s.code)}</span>
      <div class="sess-meta" id="qc-${s.id}">— in queue</div>
      <div class="sess-meta">${fmtD(s.createdAt)} · ${s.active?'<span style="color:var(--a-accent)">ACTIVE</span>':'CLOSED'}</div>
    </div>`).join('');

  // per-session queue count sub-listeners
  list.forEach(s => {
    const u = db.collection('queue').where('sessionId','==',s.id)
      .onSnapshot(snap => {
        const c = document.getElementById('qc-'+s.id);
        if (c) c.textContent = snap.size + ' in queue';
      });
    adm.unsubs.push(u);
  });
}

async function adminCreateSession() {
  const inp = document.getElementById('inp-sess');
  const name = inp.value.trim();
  if (!name) return;
  const ref = await db.collection('sessions').add({
    name, code: genCode(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    active: true
  });
  inp.value = '';
  adminSelect(ref.id);
}

function adminSelect(id) {
  adm.selId = id;
  // highlight
  document.querySelectorAll('.sess-card').forEach(c => c.classList.toggle('sel', c.dataset.id === id));
  document.getElementById('tab-actions').style.display = 'flex';
  renderMain();
}

function adminTab(t) {
  adm.tab = t;
  document.getElementById('tb-queue').classList.toggle('on', t==='queue');
  document.getElementById('tb-log').classList.toggle('on', t==='log');
  renderMain();
}

async function adminCloseSession() {
  if (!adm.selId) return;
  await db.collection('sessions').doc(adm.selId).update({ active: false });
}

async function adminClearQueue() {
  if (!adm.selId) return;
  const snap = await db.collection('queue').where('sessionId','==',adm.selId).get();
  const batch = db.batch();
  snap.forEach(d => batch.delete(d.ref));
  await batch.commit();
}

async function adminDismiss(entryId) {
  await db.collection('queue').doc(entryId).delete();
  try { await db.collection('log').doc(entryId).update({ dismissed: true }); } catch{}
}

/* ── Main content area ──────────────────────────────────── */
let mainUnsub1 = null, mainUnsub2 = null;
function stopMainListeners() {
  if (mainUnsub1) { mainUnsub1(); mainUnsub1 = null; }
  if (mainUnsub2) { mainUnsub2(); mainUnsub2 = null; }
}

function renderMain() {
  stopMainListeners();
  if (!adm.selId) return;
  const content = document.getElementById('adm-content');

  // Watch session doc for active state
  mainUnsub1 = db.collection('sessions').doc(adm.selId).onSnapshot(snap => {
    if (!snap.exists) return;
    const s = { id: snap.id, ...snap.data() };
    document.getElementById('btn-close').style.display = s.active ? 'inline-block' : 'none';

    stopMainListeners(); // restart with correct tab
    if (adm.tab === 'queue') {
      mainUnsub2 = db.collection('queue')
        .where('sessionId','==',adm.selId)
        .orderBy('buzzedAt','asc')
        .onSnapshot(snap2 => {
          const rows = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
          let h = `<div class="content-title">Live Queue — ${esc(s.name)} [${esc(s.code)}] — ${rows.length} waiting</div>`;
          if (!rows.length) h += '<div class="empty">Queue is empty</div>';
          else h += '<div class="q-grid">' + rows.map((e,i) => `
            <div class="q-card">
              <div class="q-num">#${i+1}</div>
              <div class="q-name">${esc(e.name)}</div>
              <div class="q-time">${fmt(e.buzzedAt)}</div>
              <div class="q-actions"><button class="adm-btn sm red" onclick="adminDismiss('${e.id}')">Dismiss</button></div>
            </div>`).join('') + '</div>';
          content.innerHTML = h;
        });
    } else {
      mainUnsub2 = db.collection('log')
        .where('sessionId','==',adm.selId)
        .orderBy('buzzedAt','desc')
        .onSnapshot(snap2 => {
          const rows = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
          let h = `<div class="content-title">History — ${esc(s.name)} — ${rows.length} events</div>`;
          if (!rows.length) h += '<div class="empty">No buzz events yet</div>';
          else h += `<table class="log-tbl">
            <thead><tr><th>Pos</th><th>Participant</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
            <tbody>${rows.map(e=>`<tr>
              <td><span class="lbadge">#${e.position||'?'}</span></td>
              <td style="color:var(--a-text);font-weight:500">${esc(e.name)}</td>
              <td style="color:var(--a-muted)">${fmtD(e.buzzedAt)}</td>
              <td style="color:var(--a-muted)">${fmt(e.buzzedAt)}</td>
              <td>${e.dismissed?'<span class="tag-dis">Dismissed</span>':'<span class="tag-act">Active</span>'}</td>
            </tr>`).join('')}</tbody></table>`;
          content.innerHTML = h;
        });
    }
    // push to unsubs so they get cleaned on adminInit
    if (mainUnsub2) adm.unsubs.push(mainUnsub2);
  });
  adm.unsubs.push(mainUnsub1);
}

/* ════════════════════════════════════════════════════════════
   AUDIENCE — STATE
════════════════════════════════════════════════════════════ */
let aud = {
  session:  null,
  name:     '',
  entryId:  null,
  buzzed:   false,
  queueSub: null,
};

function audErr(msg) {
  const el = document.getElementById('aud-err');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

async function audJoin() {
  const name = document.getElementById('aud-name').value.trim();
  const code = document.getElementById('aud-code').value.trim().toUpperCase();
  audErr('');
  if (!name) { audErr('Please enter your name.'); return; }
  if (code.length !== 4) { audErr('Enter the 4-character session code.'); return; }

  const snap = await db.collection('sessions')
    .where('code','==',code).where('active','==',true).get();
  if (snap.empty) { audErr('Session not found or already closed.'); return; }

  aud.session = { id: snap.docs[0].id, ...snap.docs[0].data() };
  aud.name    = name;
  aud.buzzed  = false;
  aud.entryId = null;

  document.getElementById('join-panel').style.display  = 'none';
  document.getElementById('buzz-panel').style.display  = 'flex';
  document.getElementById('bz-sess-label').textContent = aud.session.name + ' · ' + aud.session.code;
  resetBuzzUI();
}

function resetBuzzUI() {
  const btn = document.getElementById('bz-btn');
  btn.className = 'bz-btn'; btn.textContent = 'BUZZ'; btn.disabled = false;
  document.getElementById('bz-pos-block').style.display = 'none';
  const st = document.getElementById('bz-status');
  st.textContent = 'Ready · tap to buzz'; st.className = 'bz-status idle';
}

async function audBuzz() {
  if (aud.buzzed || !aud.session) return;

  // count current queue size for position
  const qSnap = await db.collection('queue').where('sessionId','==',aud.session.id).get();
  const pos = qSnap.size + 1;

  const entry = {
    sessionId: aud.session.id,
    name:      aud.name,
    buzzedAt:  firebase.firestore.FieldValue.serverTimestamp(),
    position:  pos,
    dismissed: false,
  };

  // Write to queue and log simultaneously
  const ref = await db.collection('queue').add(entry);
  await db.collection('log').doc(ref.id).set(entry);

  aud.entryId = ref.id;
  aud.buzzed  = true;

  // Update UI
  const btn = document.getElementById('bz-btn');
  btn.className = 'bz-btn fired'; btn.textContent = 'BUZZED!'; btn.disabled = true;
  document.getElementById('bz-pos-block').style.display = 'block';
  document.getElementById('bz-pos-num').textContent = '#' + pos;
  const st = document.getElementById('bz-status');
  st.textContent = 'In queue — hold tight!'; st.className = 'bz-status waiting';

  // Flash
  const fl = document.createElement('div'); fl.className = 'bz-flash';
  document.body.appendChild(fl); setTimeout(() => fl.remove(), 600);

  // Watch queue for position + dismissal
  if (aud.queueSub) { aud.queueSub(); aud.queueSub = null; }
  aud.queueSub = db.collection('queue')
    .where('sessionId','==',aud.session.id)
    .orderBy('buzzedAt','asc')
    .onSnapshot(snap => {
      const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const mine = all.find(e => e.id === aud.entryId);
      if (!mine) {
        // dismissed by admin
        const btn = document.getElementById('bz-btn');
        btn.className = 'bz-btn gone'; btn.textContent = 'DISMISSED'; btn.disabled = true;
        document.getElementById('bz-pos-block').style.display = 'none';
        const st = document.getElementById('bz-status');
        st.textContent = 'You were dismissed'; st.className = 'bz-status out';
        aud.buzzed = false; aud.entryId = null;
        if (aud.queueSub) { aud.queueSub(); aud.queueSub = null; }
        return;
      }
      const idx = all.findIndex(e => e.id === aud.entryId) + 1;
      document.getElementById('bz-pos-num').textContent = '#' + idx;
    });
}

function audLeave() {
  if (aud.queueSub) { aud.queueSub(); aud.queueSub = null; }
  aud.session = null; aud.name = ''; aud.entryId = null; aud.buzzed = false;
  document.getElementById('buzz-panel').style.display = 'none';
  document.getElementById('join-panel').style.display = 'block';
  document.getElementById('aud-name').value = '';
  document.getElementById('aud-code').value = '';
  audErr('');
}

/* ════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════ */
adminInit();
</script>
